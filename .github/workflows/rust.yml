name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - name: Install system dependencies
      run: |
        set -euxo pipefail

        if command -v sudo >/dev/null 2>&1; then
          SUDO=sudo
        else
          SUDO=
        fi

        $SUDO apt-get update
        $SUDO apt-get install -y --no-install-recommends \
          pkg-config \
          libasound2-dev \
          libudev1 \
          libudev-dev \
          libwayland-dev \
          libxkbcommon-dev

        PC_PATH="$(pkg-config --variable pc_path pkg-config || true)"
        echo "PKG_CONFIG_PATH=$PC_PATH" >> "$GITHUB_ENV"

    - name: Verify system dependencies
      run: |
        set -euxo pipefail

        dpkg -s pkg-config libasound2-dev libudev1 libudev-dev libwayland-dev libxkbcommon-dev

    - name: Verify pkg-config libraries
      run: |
        set -euxo pipefail

        pkg-config --variable pc_path pkg-config
        pkg-config --exists libudev
        pkg-config --exists wayland-client
        pkg-config --modversion libudev
        pkg-config --modversion wayland-client
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
