name: Release Game

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "assets/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".releaserc.json"

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  BINARY_NAME: apeiron-cipher

jobs:
  # ── Step 1: determine version and create tag + GitHub release ──────────
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semrel.outputs.new_release_published }}
      new_release_version: ${{ steps.semrel.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run semantic-release
        id: semrel
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: build native binaries (one job per platform) ───────────────
  build-windows:
    name: Build Windows
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-native-target.yml
    with:
      target: x86_64-pc-windows-msvc
      os: windows-latest
      ext: .exe
      version: ${{ needs.semantic-release.outputs.new_release_version }}

  build-macos-x86:
    name: Build macOS x86_64
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-native-target.yml
    with:
      target: x86_64-apple-darwin
      os: macos-latest
      version: ${{ needs.semantic-release.outputs.new_release_version }}

  build-macos-arm:
    name: Build macOS ARM64
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-native-target.yml
    with:
      target: aarch64-apple-darwin
      os: macos-latest
      version: ${{ needs.semantic-release.outputs.new_release_version }}

  build-linux-x86:
    name: Build Linux x86_64
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-native-target.yml
    with:
      target: x86_64-unknown-linux-gnu
      os: ubuntu-latest
      version: ${{ needs.semantic-release.outputs.new_release_version }}

  build-linux-arm:
    name: Build Linux ARM64
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-native-target.yml
    with:
      target: aarch64-unknown-linux-gnu
      os: ubuntu-latest
      cross: true
      version: ${{ needs.semantic-release.outputs.new_release_version }}

  # ── Step 3: build WASM ─────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    needs: [semantic-release]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Install matching wasm-bindgen-cli
        run: |
          WB_VERSION=$(cargo metadata --format-version 1 \
            | jq -r '.packages[] | select(.name == "wasm-bindgen") | .version')
          cargo install wasm-bindgen-cli --version "$WB_VERSION"

      - name: Generate JS bindings
        run: |
          wasm-bindgen \
            --out-dir wasm-out \
            --out-name ${{ env.BINARY_NAME }} \
            --target web \
            target/wasm32-unknown-unknown/release/${{ env.BINARY_NAME }}.wasm

      - name: Create HTML shell
        run: |
          cat > wasm-out/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Apeiron Cipher</title>
            <style>
              html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
              canvas { width: 100%; height: 100%; display: block; }
            </style>
          </head>
          <body>
            <script type="module">
              import init from './${{ env.BINARY_NAME }}.js';
              init();
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Copy assets into WASM bundle
        run: cp -r assets wasm-out/

      - name: Package
        run: |
          VERSION="v${{ needs.semantic-release.outputs.new_release_version }}"
          STAGING="${{ env.BINARY_NAME }}-${VERSION}-wasm"
          mv wasm-out "$STAGING"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: ${{ env.ASSET }}

  # ── Step 4: attach whatever built successfully to the GitHub release ───
  upload-assets:
    name: Upload Release Assets
    needs:
      - semantic-release
      - build-windows
      - build-macos-x86
      - build-macos-arm
      - build-linux-x86
      - build-linux-arm
      - build-wasm
    if: |
      !cancelled() &&
      needs.semantic-release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.semantic-release.outputs.new_release_version }}"
          files: artifacts/*
