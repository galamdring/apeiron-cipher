name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cargo-test:
    name: Cargo test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Run tests
        run: cargo test --all-targets --all-features
