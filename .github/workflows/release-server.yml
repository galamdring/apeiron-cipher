name: Server CI/CD

on:
  pull_request:
    paths:
      - "infra/orchestrator/cmd/server/**"
      - ".github/workflows/release-server.yml"
      - "infra/orchestrator/.releaserc.server.json"
  push:
    branches: [main]
    paths:
      - "infra/orchestrator/cmd/server/**"
      - ".github/workflows/release-server.yml"
      - "infra/orchestrator/.releaserc.server.json"

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/galamdring/apeiron-orchestrator-server

jobs:
  build-pr:
    name: Build and push (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: infra/orchestrator
          target: server
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.sha.outputs.short }}

  release:
    name: Semantic release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.new_release_version }}
      published: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select semantic-release config
        run: cp infra/orchestrator/.releaserc.server.json infra/orchestrator/.releaserc.json

      - name: Semantic release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          working_directory: infra/orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push-image:
    name: Push release image
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: server-v${{ needs.release.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: infra/orchestrator
          target: server
          push: true
          tags: |
            ${{ env.IMAGE }}:v${{ needs.release.outputs.version }}
            ${{ env.IMAGE }}:latest
