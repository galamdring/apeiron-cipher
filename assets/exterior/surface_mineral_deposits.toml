# Story 5.2 exterior object definitions.
#
# This file defines the first generated exterior object family: surface mineral
# deposits. The object type is explicit in both the file name and the entry
# structure so later stories do not have to reverse-engineer what "the first
# exterior thing" was meant to be.

# Distance between deterministic deposit-site candidate cells inside each chunk.
site_spacing_world_units = 8.5

# World-space scale for the continuous site-density field.
#
# Larger values make neighboring areas feel more similar. Smaller values make
# the field change more quickly across the world.
site_density_field_scale_world_units = 24.0

# Minimum field value required for a site candidate to become a visible deposit.
site_spawn_threshold = 0.42

# Fraction of site spacing the deposit center may jitter away from the cell center.
site_jitter_fraction = 0.28

# Minimum air gap between separate deposit sites once their radii are considered.
site_min_gap_world_units = 1.5

[[deposits]]
key = "dense_cluster_deposit"
selection_weight = 1.0
scale_min = 0.9
scale_max = 1.2
deposit_radius_min = 2.4
deposit_radius_max = 3.8
child_count_min = 7
child_count_max = 11
cluster_compactness = 0.75

[[deposits]]
