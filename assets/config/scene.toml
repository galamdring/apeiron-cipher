# Scene tuning — room geometry, lighting, and player spawn.
# Edit these values instead of changing Rust constants.

[room]
half_extent_x = 4.0
half_extent_z = 4.0
wall_height = 3.0
wall_thickness = 0.2
# Player AABB clamp: inner half-extent minus this margin (meters).
boundary_margin = 0.12

[player]
eye_height = 1.7
spawn_x = 0.0
spawn_z = 2.0
move_speed = 5.0
# Max height the player can step up onto a surface (meters).
step_up_tolerance = 0.5
# Height above feet at which dropped items search for a surface (meters).
drop_surface_reach = 1.5

[lighting]
ambient_brightness = 14.0
directional_illuminance = 1100.0
directional_shadows = true
# Spot above workbench — lumens (Bevy PBR units).
spot_intensity = 280_000.0
spot_range = 12.0
spot_inner_angle = 0.28
spot_outer_angle = 0.48
spot_height = 2.75
spot_target_y = 0.45

[furniture]
workbench_width = 2.0
workbench_height = 0.88
workbench_depth = 1.0
workbench_x = 0.0
workbench_z = 0.0
shelf_width = 1.35
shelf_thickness = 0.07
shelf_depth = 0.55

# West wall — flush against inner face (x = -4.0 + shelf_depth/2).
[[furniture.shelves]]
x = -3.725
z = 0.7
y = 0.92

# East wall — flush against inner face (x = 4.0 - shelf_depth/2).
[[furniture.shelves]]
x = 3.725
z = -0.7
y = 0.92

# North wall — flush against inner face (z = 4.0 - shelf_depth/2).
# Moved from south wall to avoid blocking the doorway.
[[furniture.shelves]]
x = 0.0
z = 3.725
y = 0.92

[fabricator]
# Input slots: left side of bench, spaced apart on the Z axis.
slot_offset_x = -0.45
slot_spacing_z = 0.3
slot_radius = 0.07
slot_height = 0.02
# Output slot: center of bench, slightly forward.
output_offset_x = 0.0
output_offset_z = -0.25
output_radius = 0.09
output_height = 0.02
# How long the fabrication process takes (seconds).
process_seconds = 2.5

[heat_source]
# Offset from workbench center — sits on the right side of the bench.
offset_x = 0.55
offset_z = 0.0
radius = 0.1
# Materials within this distance of the burner are "in the heat zone".
zone_radius = 1.0
light_intensity = 40_000.0
# Seconds of continuous exposure for a material to fully react.
reaction_seconds = 2.5
# Seconds of continuous exposure before thermal_resistance is revealed.
reveal_seconds = 3.5
