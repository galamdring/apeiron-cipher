active_profile = "default"
starting_capacity = 5.0
starting_strength = 1.0
growth_rate = 0.02

# If set, carry capacity is modeled as coming from a named carry-enabling item.
# grant_starting_device controls whether the player begins with that item already.
carry_device_item_key = "satchel_basic"
grant_starting_device = true

# Story 4.2 will consume this once carry retrieval is implemented.
cycle_order = "fifo"

[growth_curve]
kind = "asymptotic"
max_strength = 8.0

[[weight_descriptions]]
max_ratio = 0.1
text = "Almost weightless"

[[weight_descriptions]]
max_ratio = 0.3
text = "Light enough to carry easily"

[[weight_descriptions]]
max_ratio = 0.5
text = "Solid weight"

[[weight_descriptions]]
max_ratio = 0.7
text = "Heavy but manageable"

[[weight_descriptions]]
max_ratio = 0.9
text = "Straining under the weight"

[[weight_descriptions]]
max_ratio = 9999.0
text = "Barely able to lift"

[profiles.default]
stamina_cost_multiplier = 1.4
hard_limit_enabled = true

[profiles.default.speed_curve]
kind = "linear"
min_multiplier = 0.45
exponent = 1.35

[profiles.relaxed]
stamina_cost_multiplier = 1.15
hard_limit_enabled = false

[profiles.relaxed.speed_curve]
kind = "linear"
min_multiplier = 0.75
exponent = 1.0

[profiles.creative]
stamina_cost_multiplier = 1.0
hard_limit_enabled = false

[profiles.creative.speed_curve]
kind = "linear"
min_multiplier = 1.0
exponent = 1.0
