# World-generation foundation for Epic 5.
#
# Two seeding modes are supported:
#
# **Override mode** (current default): set `planet_seed` directly. The solar
# system seed is used for star derivation and logging, but the planet seed
# is taken as-is without running the orbital derivation chain. This is the
# recommended mode for testing — reproducible without needing the full chain.
#
# **System-derived mode**: omit `planet_seed` and set `solar_system_seed` +
# `planet_index`. The full derivation chain runs at startup:
#   system seed → star profile → orbital layout → planet selection → planet seed
#
# To switch to system-derived mode: comment out `planet_seed` and uncomment
# `planet_index`.

# ── Seed Configuration ──────────────────────────────────────────────────

# Stable identity for the solar system this planet belongs to.
# The star profile and orbital layout are deterministically derived from
# this seed at startup. In system-derived mode, the planet seed is also
# derived from this seed.
# Accepts both `solar_system_seed` (canonical) and `system_seed` (legacy).
solar_system_seed = 20260501

# Override mode: planet seed is used directly, skipping orbital derivation.
# Uncomment this line and comment out planet_index to switch to override mode.
# planet_seed = 20260408

# System-derived mode: zero-based index selecting which orbital slot to
# start on. Only used when planet_seed is absent.
planet_index = 2

# Exterior chunk size in Bevy world units.
#
# The initial default is 45 because it comfortably contains the current room
# and nearby exterior patch while still giving later chunk-generation stories a
# meaningful neighborhood size to work with.
chunk_size_world_units = 45.0

# Logical active neighborhood around the player's current chunk.
#
# Radius 1 means a 3x3 block of chunks centered on the player's chunk.
active_chunk_radius = 1

# Side length (in world units) of 3D building cells used for spatial overlap
# detection when merging player additions from different sources.
#
# Two player-added objects in the same cell are considered a conflict during
# delta merging. Smaller values = finer granularity, larger = more forgiving.
building_cell_size = 1.0

# Planet surface size bounds (in chunks).
#
# The actual planet radius is derived deterministically from the planet seed
# within this range. The planet surface is a square grid of (2 * radius) chunks
# on each side, with torus wrapping — walking off one edge brings you to the
# opposite side.
#
# With a 45-unit chunk size:
#   radius 500  → diameter 1000  × 45 = 45,000 world units (~45 km)
#   radius 5000 → diameter 10000 × 45 = 450,000 world units (~450 km)
planet_surface_min_radius = 500
planet_surface_max_radius = 5000

# ── Terrain Elevation (Story 5a.3) ──────────────────────────────────────
#
# Multi-octave value noise produces terrain height variation across the
# planet surface. The elevation field is seeded from the planet seed via
# a dedicated channel, so it is deterministic and independent of other
# noise fields.

# Maximum height deviation from base_y (in world units).
elevation_amplitude = 10.0

# Base noise frequency (in world units). Lower values = broader features.
elevation_frequency = 0.005

# Number of fractal noise octaves layered for terrain elevation.
elevation_octaves = 4

# Blend weight for chunk-level detail noise added on top of the base
# elevation field. 0.0 disables the detail layer.
elevation_detail_weight = 0.3

# Base frequency for the detail noise layer. Higher than the base
# elevation_frequency to add fine-grained terrain variation.
elevation_detail_frequency = 0.02

# Number of fractal noise octaves for the detail noise layer.
elevation_detail_octaves = 2

# Sea-level reference height (in world units). Elevation noise is added
# on top of this value.
elevation_base_y = -0.01

# Number of subdivisions per chunk edge for the heightmap mesh.
# N subdivisions produce an (N+1)² vertex grid per chunk.
elevation_subdivisions = 8
