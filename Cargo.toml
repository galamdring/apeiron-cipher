[package]
name = "apeiron-cipher"
version = "0.1.0"
edition = "2024"

[dependencies]
# Bevy game engine — ECS-based 3D game framework
bevy = "0.18.1"
# Action-based input mapping for Bevy — maps raw inputs to named actions
leafwing-input-manager = "0.20.0"
# Serialization framework — used for TOML config deserialization
serde = { version = "1.0.228", features = ["derive"] }
# TOML parser — used for player-editable config files
toml = "1.0.7"
# Compile-time enum iteration — used to drive ObservationCategory display
# order from the enum definition itself, so adding a new variant cannot
# silently hide that category from the journal UI.
strum = { version = "0.27", features = ["derive"] }

[dev-dependencies]
# JSON serializer — used in tests to verify serde round-tripping
serde_json = "1.0"
